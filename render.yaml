services:
  # FastAPI Web Service with Aiogram Bot Polling
  - type: web
    name: gamehub-app
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: gamehub-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: gamehub-redis
          property: connectionString
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_ADMIN_CHAT_ID
        value: "6438818927"
      - key: WHOLESALE_API_TOKEN
        sync: false
      - key: WHOLESALE_API_BASE_URL
        sync: false
      - key: INTERNAL_API_SECRET_TOKEN
        sync: false

# Database Instance
databases:
  - name: gamehub-db
    plan: free

# Redis Instance
redis:
  - name: gamehub-redis
    plan: free
